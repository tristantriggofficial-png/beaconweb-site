# BeaconWeb — Netlify Configuration v2.0

[build]
  publish = "."

# --- Clean URLs ---
[[redirects]]
  from = "/free-audit"
  to = "/free-audit.html"
  status = 200

[[redirects]]
  from = "/get-audit"
  to = "/get-audit.html"
  status = 200

[[redirects]]
  from = "/work"
  to = "/work.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# --- Remove old pages (redirect to home) ---
[[redirects]]
  from = "/packages.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/pricing.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/the-system.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/marketing.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/portfolio.html"
  to = "/work.html"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/web-designer-*"
  to = "/"
  status = 301

# --- Security & performance headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://stcdn.leadconnectorhq.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://beaconwebhq.com https://link.msgsndr.com https://connect.facebook.net https://widgets.leadconnectorhq.com https://stcdn.leadconnectorhq.com https://services.leadconnectorhq.com; img-src 'self' data: https:; connect-src 'self' https://services.leadconnectorhq.com https://beaconwebhq.com https://beaconweb-ads-bot.netlify.app https://connect.facebook.net https://www.facebook.com https://widgets.leadconnectorhq.com wss://widgets.leadconnectorhq.com https://stcdn.leadconnectorhq.com; frame-src https://api.leadconnectorhq.com https://widgets.leadconnectorhq.com;"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
