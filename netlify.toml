# BeaconWeb — Netlify Configuration v2.0

[build]
  publish = "."

# --- Clean URLs ---
[[redirects]]
  from = "/the-system"
  to = "/the-system.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# --- Remove old pages (redirect to home) ---
[[redirects]]
  from = "/packages.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/marketing.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/portfolio.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/web-designer-*"
  to = "/"
  status = 301

# --- Security & performance headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://services.leadconnectorhq.com;"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
